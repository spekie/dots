<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
<alias>
  <family>serif</family>
  <prefer>
    <family>LiberationSerif</family>
  </prefer>
</alias>
<alias>
  <family>sans-serif</family>
  <prefer>
    <family>LiberationSans</family>
  </prefer>
</alias>
<alias>
  <family>monospace</family>
  <prefer>
    <family>LiberationMono</family>
  </prefer>
</alias>
</fontconfig>
